<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neuroanatomy Study Slides</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .quiz-container {
            background: white;
            width: 90%;
            max-width: 600px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }
        .progress-bar {
            font-size: 0.9em;
            color: #7f8c8d;
            margin-bottom: 20px;
        }
        .question-text {
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 20px;
            color: #34495e;
        }
        .options {
            text-align: left;
            margin-bottom: 20px;
        }
        .option {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option:hover {
            background: #e9ecef;
        }
        .option.selected {
            border-color: #3498db;
            background: #ebf5fb;
        }
        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-weight: bold;
        }
        .correct { background: #d4edda; color: #155724; }
        .incorrect { background: #f8d7da; color: #721c24; }
        
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
        }
        #check-btn { background: #3498db; color: white; }
        #next-btn { background: #27ae60; color: white; display: none; }
        #restart-btn { background: #e67e22; color: white; display: none; }
    </style>
</head>
<body>

<div class="quiz-container" id="quiz-box">
    <div class="progress-bar" id="progress">Question 1 of 20</div>
    <div class="question-text" id="question">Loading...</div>
    <div class="options" id="options-container"></div>
    
    <div class="feedback" id="feedback"></div>

    <div class="controls">
        <button id="check-btn" onclick="checkAnswer()">Check Answer</button>
        <button id="next-btn" onclick="nextQuestion()">Next Question</button>
        <button id="restart-btn" onclick="location.reload()">Restart Quiz</button>
    </div>
</div>

<script>
    const questions = [
        { q: "Which structures connect the cerebellum to the brainstem?", a: "Cerebellar peduncles", options: ["Basal ganglia", "Cerebellar peduncles", "Corpus callosum", "Medullary pyramids"], note: "The superior, middle, and inferior peduncles are the 'bridges' between the brainstem and cerebellum." },
        { q: "The cardiovascular and respiratory centers are primarily located in the:", a: "Medulla oblongata", options: ["Midbrain", "Cerebellum", "Medulla oblongata", "Thalamus"], note: "The medulla is the 'autonomic hub' for life-sustaining functions." },
        { q: "The substantia nigra, involved in dopamine production, is located in the:", a: "Midbrain", options: ["Midbrain", "Pons", "Medulla", "Cerebellar cortex"], note: "Located in the midbrain; loss of these neurons leads to Parkinson's disease." },
        { q: "What is the primary function of the cerebellum?", a: "Coordinating motor movements and balance", options: ["Initiating voluntary contractions", "Coordinating motor movements and balance", "Conscious sensory perception", "Regulating sleep-wake cycles"], note: "It acts as a 'quality control' center for movement." },
        { q: "The superior colliculi are responsible for:", a: "Visual reflexes", options: ["Auditory reflexes", "Visual reflexes", "Proprioception", "Facial expressions"], note: "Superior = Sight; Inferior = Sound." },
        { q: "Damage to the cerebellum usually presents as:", a: "Ataxia", options: ["Ataxia", "Spastic paralysis", "Loss of sensation", "Aphasia"], note: "Ataxia is characterized by 'drunk-like' uncoordinated movements." },
        { q: "Most efferent (output) fibers leave the cerebellum through the:", a: "Superior cerebellar peduncle", options: ["Inferior peduncle", "Middle peduncle", "Superior cerebellar peduncle", "Cerebral peduncles"], note: "The superior peduncle is the primary output pathway to the midbrain and thalamus." },
        { q: "Which diffuse network in the brainstem maintains alertness?", a: "Reticular Formation (RAS)", options: ["Limbic System", "Reticular Formation (RAS)", "Extrapyramidal System", "Medial Lemniscus"], note: "The RAS is the 'alarm clock' of the brain." },
        { q: "The pneumotaxic center (breathing regulation) is found in the:", a: "Pons", options: ["Midbrain", "Medulla", "Cerebellum", "Pons"], note: "The pons works with the medulla to smooth out respiratory rhythms." },
        { q: "The inferior olivary nuclei relay information to the cerebellum regarding:", a: "Proprioceptive and motor learning", options: ["Proprioceptive and motor learning", "Pain and temperature", "Visual input", "Auditory input"], note: "The olives are vital for timing and motor coordination." },
        { q: "Which ascending tract transmits pain and temperature?", a: "Lateral spinothalamic tract", options: ["Anterior spinothalamic tract", "Lateral spinothalamic tract", "Fasciculus gracilis", "Corticospinal tract"], note: "Lateral = Pain/Temp; Anterior = Crude touch." },
        { q: "The DCML pathway carries information regarding:", a: "Fine touch, vibration, and conscious proprioception", options: ["Fine touch, vibration, and conscious proprioception", "Crude touch", "Unconscious proprioception", "Voluntary motor commands"], note: "The Dorsal Column system is for 'high-resolution' tactile info." },
        { q: "Which tract is essential for skilled finger movements?", a: "Lateral corticospinal tract", options: ["Rubrospinal tract", "Vestibulospinal tract", "Lateral corticospinal tract", "Tectospinal tract"], note: "This is the primary voluntary motor pathway." },
        { q: "Where does the decussation (crossing) of the corticospinal tract occur?", a: "The pyramids of the medulla", options: ["The thalamus", "The pyramids of the medulla", "The spinal cord", "The pons"], note: "This is why the left brain controls the right side of the body." },
        { q: "Where are cell bodies of lower motor neurons located?", a: "Ventral (anterior) horn", options: ["Dorsal root ganglia", "Lateral horn", "Dorsal horn", "Ventral (anterior) horn"], note: "The ventral horn is the 'exit' for motor commands." },
        { q: "A positive Babinski sign in an adult indicates damage to:", a: "Upper motor neurons", options: ["Lower motor neurons", "Upper motor neurons", "Spinocerebellar tracts", "Peripheral nerves"], note: "Babinski is a classic sign of corticospinal (UMN) damage." },
        { q: "The spinocerebellar tracts carry what type of info?", a: "Unconscious proprioception", options: ["Conscious proprioception", "Unconscious proprioception", "Pain", "Light touch"], note: "This info goes to the cerebellum, so you aren't 'conscious' of it." },
        { q: "Which tract originates in the red nucleus of the midbrain?", a: "Rubrospinal tract", options: ["Rubrospinal tract", "Reticulospinal tract", "Vestibulospinal tract", "Anterior corticospinal tract"], note: "Rubro = Red (Latin)." },
        { q: "Damage to the anterior spinothalamic tract results in loss of:", a: "Crude touch and pressure", options: ["Pain sensation", "Two-point discrimination", "Crude touch and pressure", "Motor function"], note: "Anterior carries 'non-discriminative' touch." },
        { q: "A positive Romberg test (falling when eyes close) indicates a lesion in the:", a: "Dorsal columns", options: ["Corticospinal tract", "Cerebellum", "Dorsal columns", "Spinothalamic tract"], note: "If you lose balance *only* when eyes are shut, your proprioception (DCML) is failing." }
    ];

    let currentIdx = 0;
    let selectedAnswer = null;

    function loadQuestion() {
        const q = questions[currentIdx];
        document.getElementById('progress').innerText = `Question ${currentIdx + 1} of ${questions.length}`;
        document.getElementById('question').innerText = q.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        q.options.forEach(opt => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = opt;
            div.onclick = () => selectOption(div, opt);
            container.appendChild(div);
        });

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('check-btn').style.display = 'block';
        document.getElementById('next-btn').style.display = 'none';
        selectedAnswer = null;
    }

    function selectOption(element, val) {
        document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        element.classList.add('selected');
        selectedAnswer = val;
    }

    function checkAnswer() {
        if (!selectedAnswer) {
            alert("Please select an answer first!");
            return;
        }

        const q = questions[currentIdx];
        const feedback = document.getElementById('feedback');
        feedback.style.display = 'block';

        if (selectedAnswer === q.a) {
            feedback.className = 'feedback correct';
            feedback.innerHTML = `Correct! <br><small>${q.note}</small>`;
        } else {
            feedback.className = 'feedback incorrect';
            feedback.innerHTML = `Incorrect. The answer is: ${q.a} <br><small>${q.note}</small>`;
        }

        document.getElementById('check-btn').style.display = 'none';
        
        if (currentIdx < questions.length - 1) {
            document.getElementById('next-btn').style.display = 'block';
        } else {
            document.getElementById('restart-btn').style.display = 'block';
            document.getElementById('question').innerText = "Quiz Complete!";
        }
    }

    function nextQuestion() {
        currentIdx++;
        loadQuestion();
    }

    // Start
    loadQuestion();
</script>

</body>
</html>
